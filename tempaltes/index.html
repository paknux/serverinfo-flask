<!DOCTYPE html>
<html>
<head>
    <title>Server Monitor</title>
    <style>
        body { 
            font-family: sans-serif; 
            background: #121212; 
            color: #e0e0e0; 
            margin: 0;
            padding: 0;
        }
        header {
            background: #1e1e1e;
            padding: 15px 50px;
            border-bottom: 1px solid #333;
            font-weight: bold;
            font-size: 1.2em;
            color: #ffffff;
        }
        .container {
            padding: 50px;
        }
        .card { 
            background: #1e1e1e; 
            padding: 20px; 
            border-radius: 10px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.5); 
            max-width: 500px; 
            margin: auto; 
        }
        h2 { 
            color: #ffffff; 
            border-bottom: 2px solid #333; 
            padding-bottom: 10px; 
            margin-top: 0;
        }
        h3 { color: #bbbbbb; }
        .info { margin: 15px 0; font-size: 1.1em; }
        .label { font-weight: bold; color: #90caf9; }
        hr { border: 0; border-top: 1px solid #333; }
    </style>
</head>
<body>
    <header>
        🚀 ServerInfo-Flask
    </header>

    <div class="container">
        <div class="card">
            <h2>🖥️ Server Information</h2>
            <div class="info"><span class="label">Server Name:</span> {{ hostname }}</div>
            <div class="info"><span class="label">IP Address:</span> {{ ip_address }}</div>
            <div class="info"><span class="label">OS:</span> {{ os_info }}</div>
            <hr>
            <h3>📊 Live Stats</h3>
            <div class="info"><span class="label">CPU Usage:</span> {{ cpu_usage }}%</div>
            <div class="info"><span class="label">RAM Usage:</span> {{ ram_percent }}% ({{ ram_used }}GB / {{ ram_total }}GB)</div>
        </div>
    </div>
</body>
</html>
